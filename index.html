<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECOGIDA DE MUEBLES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020810;
    --surface: #050f1e;
    --surface2: #081422;
    --border: #0d2a4a;
    --border-glow: #0a4a8a;
    --cyan: #00d4ff;
    --cyan-dim: #007aa3;
    --text: #c8e8ff;
    --text-dim: #4a7a9b;
    --martes: #1565c0;
    --martes-glow: #42a5f5;
    --jueves: #1b5e20;
    --jueves-glow: #66bb6a;
    --viernes-naranja: #e65100;
    --viernes-naranja-glow: #ff9800;
    --viernes-rosa: #880e4f;
    --viernes-rosa-glow: #f06292;
    --festivo: #b71c1c;
    --grid-line: rgba(0, 212, 255, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 32px 0 24px;
    position: relative;
  }

  .header-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 12px 0;
    box-shadow: 0 0 8px var(--cyan);
  }

  .title-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--cyan-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 90%, 100% { opacity: 1; }
    95% { opacity: 0.3; }
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.6rem, 5vw, 3.2rem);
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    text-shadow:
      0 0 10px var(--cyan),
      0 0 30px rgba(0,212,255,0.4),
      0 0 60px rgba(0,212,255,0.2);
    line-height: 1.1;
    padding: 8px 0;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%, 92%, 94%, 96%, 100% { opacity: 1; }
    93%, 95% { opacity: 0.85; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--cyan-dim);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* NAV ARROWS */
  .nav-month {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border-glow);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .nav-btn:hover {
    background: rgba(0,212,255,0.1);
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,212,255,0.3);
  }

  .month-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0,212,255,0.5);
    text-transform: uppercase;
  }

  /* INFO PANELS */
  .info-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .info-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
  }

  .panel-header {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--cyan);
    padding: 8px 16px 6px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,212,255,0.04);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-dot {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .panel-body {
    padding: 10px 16px 12px 20px;
  }

  .recogida-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,212,255,0.06);
    font-size: 0.95rem;
    line-height: 1.4;
  }

  .recogida-item:last-child { border-bottom: none; }

  .recogida-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .recogida-fecha {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    min-width: 85px;
  }

  .recogida-lugar {
    font-weight: 600;
    letter-spacing: 1px;
  }

  .alerta-festivo {
    font-size: 0.78rem;
    color: #ff4444;
    font-weight: 600;
    display: block;
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .no-recogida {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    padding: 4px 0;
  }

  /* CALENDAR */
  .calendar-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  .calendar-wrapper::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 8px var(--cyan);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-header-cell {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-align: center;
    padding: 10px 4px;
    color: var(--cyan-dim);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid rgba(0,212,255,0.05);
    background: rgba(0,212,255,0.03);
  }

  .cal-header-cell:last-child { border-right: none; }

  .cal-cell {
    min-height: 64px;
    border-right: 1px solid rgba(0,212,255,0.05);
    border-bottom: 1px solid rgba(0,212,255,0.05);
    padding: 6px;
    position: relative;
    transition: background 0.2s;
    cursor: default;
  }

  .cal-cell:nth-child(7n) { border-right: none; }

  .cal-cell.empty {
    background: rgba(0,0,0,0.2);
  }

  .cal-cell.today {
    background: rgba(0,212,255,0.05);
    border-color: rgba(0,212,255,0.2) !important;
  }

  .cal-cell.today .day-num::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 50%; transform: translateX(-50%);
    width: 100%; height: 1px;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
  }

  .day-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    position: relative;
    display: inline-block;
    width: 22px;
    text-align: center;
    line-height: 22px;
  }

  /* Day type badges */
  .martes-badge { background: var(--martes); }
  .jueves-badge { background: var(--jueves); }
  .naranja-badge { background: var(--viernes-naranja); }
  .rosa-badge { background: var(--viernes-rosa); }

  .day-badge {
    border-radius: 3px;
    padding: 1px 5px;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.5px;
    font-weight: 700;
    display: block;
    text-align: center;
    line-height: 1.5;
  }

  .badge-martes {
    background: rgba(21,101,192,0.3);
    color: var(--martes-glow);
    border: 1px solid rgba(66,165,245,0.4);
    text-shadow: 0 0 6px rgba(66,165,245,0.8);
  }

  .badge-jueves {
    background: rgba(27,94,32,0.3);
    color: var(--jueves-glow);
    border: 1px solid rgba(102,187,106,0.4);
    text-shadow: 0 0 6px rgba(102,187,106,0.8);
  }

  .badge-naranja {
    background: rgba(230,81,0,0.3);
    color: var(--viernes-naranja-glow);
    border: 1px solid rgba(255,152,0,0.4);
    text-shadow: 0 0 6px rgba(255,152,0,0.8);
  }

  .badge-rosa {
    background: rgba(136,14,79,0.3);
    color: var(--viernes-rosa-glow);
    border: 1px solid rgba(240,98,146,0.4);
    text-shadow: 0 0 6px rgba(240,98,146,0.8);
  }

  /* Day number colored ring for collection days */
  .day-num.is-martes {
    color: var(--martes-glow);
    text-shadow: 0 0 8px rgba(66,165,245,0.9);
  }

  .day-num.is-jueves {
    color: var(--jueves-glow);
    text-shadow: 0 0 8px rgba(102,187,106,0.9);
  }

  .day-num.is-naranja {
    color: var(--viernes-naranja-glow);
    text-shadow: 0 0 8px rgba(255,152,0,0.9);
  }

  .day-num.is-rosa {
    color: var(--viernes-rosa-glow);
    text-shadow: 0 0 8px rgba(240,98,146,0.9);
  }

  .festivo-icon {
    position: absolute;
    top: 4px; right: 4px;
    font-size: 0.85rem;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 28px 0 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 3px;
    position: relative;
  }

  footer::before {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    margin-bottom: 20px;
  }

  .footer-brand {
    color: var(--cyan);
    font-weight: 600;
    text-shadow: 0 0 8px rgba(0,212,255,0.4);
  }

  /* Corner decorations */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    width: 40px; height: 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 2;
  }
  .corner-tl { top: 8px; left: 8px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner-tr { top: 8px; right: 8px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
  .corner-bl { bottom: 8px; left: 8px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner-br { bottom: 8px; right: 8px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

  @media (max-width: 500px) {
    .cal-cell { min-height: 48px; padding: 3px; }
    .day-num { font-size: 0.65rem; width: 18px; line-height: 18px; }
    .day-badge { font-size: 0.5rem; padding: 0 2px; }
    .festivo-icon { font-size: 0.65rem; }
    .legend-item { font-size: 0.6rem; }
  }
</style>
</head>
<body>
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<div class="container">
  <header>
    <div class="title-tag">// SISTEMA DE GESTIÓN //</div>
    <div class="header-line"></div>
    <h1>RECOGIDA DE MUEBLES</h1>
    <div class="subtitle">ASTURIAS · CALENDARIO OPERATIVO · 2026</div>
    <div class="header-line"></div>
  </header>

  <!-- PANEL SEMANA ACTUAL -->
  <div class="info-panel" id="panel-actual">
    <div class="panel-header">
      <div class="panel-dot"></div>
      RECOGIDAS SEMANA ACTUAL
    </div>
    <div class="panel-body" id="body-actual"></div>
  </div>

  <!-- PANEL SEMANA PRÓXIMA -->
  <div class="info-panel" id="panel-proxima">
    <div class="panel-header">
      <div class="panel-dot"></div>
      RECOGIDAS PRÓXIMA SEMANA
    </div>
    <div class="panel-body" id="body-proxima"></div>
  </div>

  <!-- NAV MES -->
  <div class="nav-month">
    <button class="nav-btn" id="btn-prev">◀ ANT</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn" id="btn-next">SIG ▶</button>
  </div>

  <!-- CALENDARIO -->
  <div class="calendar-wrapper">
    <div class="cal-grid" id="cal-headers"></div>
    <div class="cal-grid" id="cal-body"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(21,101,192,0.6);border:1px solid #42a5f5"></div>MARTES (RIBADESELLA)</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(27,94,32,0.6);border:1px solid #66bb6a"></div>JUEVES 2º/4º (COLUNGA)</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(230,81,0,0.6);border:1px solid #ff9800"></div>1ER VIERNES (PEÑAMELLERA BAJA)</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(136,14,79,0.6);border:1px solid #f06292"></div>ÚLT. VIERNES (PEÑAMELLERA ALTA)</div>
      <div class="legend-item"><div class="legend-dot" style="background:transparent;border:none;font-size:0.85rem">⚠️</div>FESTIVO</div>
    </div>
  </div>

  <footer>
    <span class="footer-brand">WEB DE JAVI:_TJ</span>
  </footer>
</div>

<script>
// ── FESTIVOS ──────────────────────────────────────────────────────────────
const FESTIVOS = {
  '2026-01-01': 'Año Nuevo',
  '2026-01-06': 'Epifanía del Señor',
  '2026-04-02': 'Jueves Santo',
  '2026-04-03': 'Viernes Santo',
  '2026-05-01': 'Fiesta del Trabajo',
  '2026-08-15': 'Asunción de la Virgen',
  '2026-09-08': 'Día de Asturias',
  '2026-10-12': 'Fiesta Nacional de España',
  '2026-11-02': 'Festividad de todos los santos',
  '2026-12-07': 'Día de la Constitución (traslado)',
  '2026-12-08': 'La Inmaculada Concepción',
  '2026-12-25': 'Natividad del Señor',
};

function isoKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function isFestivo(y, m, d) {
  return FESTIVOS[isoKey(y, m, d)] || null;
}

// ── REGLAS DE RECOGIDA ────────────────────────────────────────────────────
// Devuelve info de recogida para un día dado (Date object o y,m,d)
function getRecogida(year, month, day) {
  // month is 0-based
  const dow = new Date(year, month, day).getDay(); // 0=dom,1=lun,...,6=sab
  // Contar cuántos lunes-domingo han pasado este mes para este día
  // martes = 2, jueves = 4, viernes = 5

  if (dow === 2) {
    // Martes: contar cuál es (1º,2º,3º,4º,5º) en el mes
    const nth = Math.ceil(day / 7);
    if (nth <= 4) return { lugar: 'RIBADESELLA', tipo: 'martes', nth };
    return null; // 5º martes: no marcar
  }

  if (dow === 4) {
    // Jueves: 2º y 4º
    const nth = Math.ceil(day / 7);
    if (nth === 2 || nth === 4) return { lugar: 'COLUNGA', tipo: 'jueves', nth };
    return null;
  }

  if (dow === 5) {
    // Viernes: 1º y último del mes
    const nth = Math.ceil(day / 7);
    // Calcular último viernes del mes
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    let lastViernes = null;
    for (let d = daysInMonth; d >= 1; d--) {
      if (new Date(year, month, d).getDay() === 5) { lastViernes = d; break; }
    }
    // 1er viernes
    let firstViernes = null;
    for (let d = 1; d <= daysInMonth; d++) {
      if (new Date(year, month, d).getDay() === 5) { firstViernes = d; break; }
    }

    if (day === firstViernes && day === lastViernes) {
      // Solo hay un viernes: es tanto 1er como último
      // Priorizamos PEÑAMELLERA BAJA (1er viernes) — o podemos mostrar ambas
      return [
        { lugar: 'PEÑAMELLERA BAJA', tipo: 'naranja' },
        { lugar: 'PEÑAMELLERA ALTA', tipo: 'rosa' }
      ];
    }
    if (day === firstViernes) return { lugar: 'PEÑAMELLERA BAJA', tipo: 'naranja' };
    if (day === lastViernes) return { lugar: 'PEÑAMELLERA ALTA', tipo: 'rosa' };
    return null;
  }

  return null;
}

// ── ESTADO ────────────────────────────────────────────────────────────────
const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();

// ── RENDER CALENDARIO ─────────────────────────────────────────────────────
const DIAS = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
const MESES = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];

function renderCalendar() {
  const y = viewYear, m = viewMonth;
  document.getElementById('month-label').textContent = `${MESES[m]} ${y}`;

  // Headers
  const hd = document.getElementById('cal-headers');
  hd.innerHTML = '';
  DIAS.forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'cal-header-cell';
    cell.textContent = d;
    hd.appendChild(cell);
  });

  const cb = document.getElementById('cal-body');
  cb.innerHTML = '';

  const firstDay = new Date(y, m, 1).getDay(); // 0=dom
  // Convert to Mon-start: lun=0..dom=6
  const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  // Empty cells before
  for (let i = 0; i < startOffset; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty';
    cb.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';

    const isToday = (y === today.getFullYear() && m === today.getMonth() && d === today.getDate());
    if (isToday) cell.classList.add('today');

    const festivo = isFestivo(y, m, d);
    const recogida = getRecogida(y, m, d);

    // Day number
    const numEl = document.createElement('span');
    numEl.className = 'day-num';

    let badgeClass = '';
    let badgeText = '';

    let recList = [];
    if (recogida) {
      if (Array.isArray(recogida)) recList = recogida;
      else recList = [recogida];
    }

    if (recList.length > 0) {
      const tipo = recList[0].tipo;
      if (tipo === 'martes') { numEl.classList.add('is-martes'); badgeClass = 'badge-martes'; }
      else if (tipo === 'jueves') { numEl.classList.add('is-jueves'); badgeClass = 'badge-jueves'; }
      else if (tipo === 'naranja') { numEl.classList.add('is-naranja'); badgeClass = 'badge-naranja'; }
      else if (tipo === 'rosa') { numEl.classList.add('is-rosa'); badgeClass = 'badge-rosa'; }
    }

    numEl.textContent = d;
    cell.appendChild(numEl);

    recList.forEach((rec, idx) => {
      const badge = document.createElement('span');
      let bc = '';
      if (rec.tipo === 'martes') bc = 'badge-martes';
      else if (rec.tipo === 'jueves') bc = 'badge-jueves';
      else if (rec.tipo === 'naranja') bc = 'badge-naranja';
      else if (rec.tipo === 'rosa') bc = 'badge-rosa';
      badge.className = `day-badge ${bc}`;
      badge.textContent = rec.lugar.length > 12 ? rec.lugar.substring(0,10)+'…' : rec.lugar;
      cell.appendChild(badge);
    });

    if (festivo && recList.length > 0) {
      const icon = document.createElement('span');
      icon.className = 'festivo-icon';
      icon.textContent = '⚠️';
      icon.title = festivo;
      cell.appendChild(icon);
    }

    cb.appendChild(cell);
  }

  // Fill remaining
  const totalCells = startOffset + daysInMonth;
  const remainder = totalCells % 7;
  if (remainder !== 0) {
    for (let i = 0; i < 7 - remainder; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell empty';
      cb.appendChild(cell);
    }
  }
}

// ── RENDER PANELES DE SEMANA ──────────────────────────────────────────────
function getWeekBounds(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=dom
  const diff = (day === 0) ? -6 : 1 - day; // days to Monday
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return { mon, sun };
}

function getRecogidas(mon, sun) {
  const results = [];
  const cur = new Date(mon);
  while (cur <= sun) {
    const y = cur.getFullYear(), m = cur.getMonth(), d = cur.getDate();
    const rec = getRecogida(y, m, d);
    if (rec) {
      const recList = Array.isArray(rec) ? rec : [rec];
      recList.forEach(r => {
        const festivo = isFestivo(y, m, d);
        results.push({ y, m, d, rec: r, festivo });
      });
    }
    cur.setDate(cur.getDate() + 1);
  }
  return results;
}

const DIAS_LARGO = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function formatFecha(y, m, d) {
  const dow = new Date(y, m, d).getDay();
  return `${DIAS_LARGO[dow]} ${d} ${MESES_CORTO[m]}`;
}

function colorClass(tipo) {
  if (tipo === 'martes') return { dot: 'rgba(21,101,192,0.8)', text: '#42a5f5' };
  if (tipo === 'jueves') return { dot: 'rgba(27,94,32,0.8)', text: '#66bb6a' };
  if (tipo === 'naranja') return { dot: 'rgba(230,81,0,0.8)', text: '#ff9800' };
  if (tipo === 'rosa') return { dot: 'rgba(136,14,79,0.8)', text: '#f06292' };
  return { dot: '#aaa', text: '#aaa' };
}

function renderPanel(bodyId, mon, sun) {
  const body = document.getElementById(bodyId);
  const recogidas = getRecogidas(mon, sun);

  if (recogidas.length === 0) {
    body.innerHTML = `<div class="no-recogida">// SIN RECOGIDAS PROGRAMADAS ESTA SEMANA //</div>`;
    return;
  }

  body.innerHTML = '';
  recogidas.forEach(({ y, m, d, rec, festivo }) => {
    const col = colorClass(rec.tipo);
    const item = document.createElement('div');
    item.className = 'recogida-item';

    const dot = document.createElement('div');
    dot.className = 'recogida-dot';
    dot.style.background = col.dot;
    dot.style.boxShadow = `0 0 6px ${col.dot}`;

    const info = document.createElement('div');
    info.style.flex = '1';

    const fecha = document.createElement('span');
    fecha.className = 'recogida-fecha';
    fecha.textContent = formatFecha(y, m, d).toUpperCase() + ' · ';

    const lugar = document.createElement('span');
    lugar.className = 'recogida-lugar';
    lugar.style.color = col.text;
    lugar.style.textShadow = `0 0 8px ${col.dot}`;
    lugar.textContent = rec.lugar;

    info.appendChild(fecha);
    info.appendChild(lugar);

    if (festivo) {
      const alerta = document.createElement('span');
      alerta.className = 'alerta-festivo';
      alerta.innerHTML = `⚠️ ATENCIÓN: COINCIDE CON FESTIVO, PUEDE HABER CAMBIOS`;
      info.appendChild(alerta);
    }

    item.appendChild(dot);
    item.appendChild(info);
    body.appendChild(item);
  });
}

function renderPanels() {
  const { mon: monAct, sun: sunAct } = getWeekBounds(today);
  const nextMon = new Date(monAct); nextMon.setDate(monAct.getDate() + 7);
  const nextSun = new Date(sunAct); nextSun.setDate(sunAct.getDate() + 7);

  renderPanel('body-actual', monAct, sunAct);
  renderPanel('body-proxima', nextMon, nextSun);
}

// ── NAV ───────────────────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
});

document.getElementById('btn-next').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
});

// ── INIT ──────────────────────────────────────────────────────────────────
renderPanels();
renderCalendar();
</script>
